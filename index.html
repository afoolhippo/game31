<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>カバカード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <section id="titleScreen" class="screen active">
      <div class="title-wrap">
        <img src="title.png" alt="カバカード" class="title-img" id="titleImage">
        <p class="rule">
          カードを召喚してCPUとデュエル！<br>
          攻撃表示・守備表示を選び、LPを0にしよう。
        </p>
        <button id="startBtn" class="main-btn">タップしてスタート</button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <button id="backTitleBtn" class="top-btn">タイトルへ戻る</button>

      <div class="battle-header">
        <div class="lp-box cpu-lp">CPU LP <span id="cpuLp">2000</span></div>
        <div class="turn-box" id="turnText">あなたのターン</div>
        <div class="lp-box player-lp">YOU LP <span id="playerLp">2000</span></div>
      </div>

      <div class="field-area">
        <div class="side-label">CPU FIELD</div>
        <div id="cpuField" class="field-row"></div>

        <div id="messageBox" class="message-box">
          カードを選んで召喚しよう！
        </div>

        <div id="playerField" class="field-row"></div>
        <div class="side-label">YOU FIELD</div>
      </div>

      <div class="hand-area">
        <div class="hand-title">HAND</div>
        <div id="playerHand" class="hand-row"></div>
      </div>

      <div class="action-area">
        <button id="endTurnBtn" class="sub-btn">ターン終了</button>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="result-wrap">
        <img id="resultImage" src="result_win.png" alt="結果" class="result-img">
        <h1 id="resultTitle">カバマスター</h1>
        <p id="resultComment">デュエルを制した！</p>

        <div class="result-buttons">
          <button id="shareBtn" class="main-btn">Xでシェア</button>
          <button id="retryBtn" class="main-btn">もう1回遊ぶ</button>
          <button id="homeBtn" class="main-btn">カバゲーセンへ</button>
        </div>
      </div>
    </section>

    <div id="modal" class="modal hidden">
      <div class="modal-box">
        <div id="modalContent"></div>
      </div>
    </div>

  </div>

  <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
  <script src="game.js"></script>
</body>
</html>
