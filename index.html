<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>カバカード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <section id="titleScreen" class="screen active">
      <div class="title-wrap">
        <img src="title.png" alt="カバカード" class="title-img" id="titleImage">
        <p class="rule">
          手札から1枚出してCPUと勝負！<br>
          つよさの差だけライフにダメージ！
        </p>
        <button id="startBtn" class="main-btn">タップしてスタート</button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <button id="backTitleBtn" class="top-btn">タイトルへ戻る</button>

      <div class="status-area">
        <div class="status-box">
          CPU ライフ <span id="cpuLife">20</span><br>
          のこりカード <span id="cpuDeckCount">20</span>
        </div>
        <div class="status-box">
          YOU ライフ <span id="playerLife">20</span><br>
          のこりカード <span id="playerDeckCount">20</span>
        </div>
      </div>

      <div class="battle-area">
        <div class="battle-card-wrap">
          <div class="label">CPU</div>
          <div id="cpuBattleCard" class="battle-card back-card">?</div>
        </div>

        <div id="messageBox" class="message-box">
          手札からカードを選ぼう！
        </div>

        <div class="battle-card-wrap">
          <div class="label">YOU</div>
          <div id="playerBattleCard" class="battle-card empty-card">未選択</div>
        </div>
      </div>

      <div class="hand-area">
        <div class="hand-title">手札</div>
        <div id="playerHand" class="hand-row"></div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="result-wrap">
        <img id="resultImage" src="result_win.png" alt="結果" class="result-img">
        <h1 id="resultTitle">カバマスター</h1>
        <p id="resultComment">勝利をつかんだ！</p>

        <div class="result-buttons">
          <button id="shareBtn" class="main-btn">Xでシェア</button>
          <button id="retryBtn" class="main-btn">もう1回遊ぶ</button>
          <button id="homeBtn" class="main-btn">カバゲーセンへ</button>
        </div>
      </div>
    </section>

  </div>

  <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
  <script src="game.js"></script>
</body>
</html>
